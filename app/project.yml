name: Blink
options:
  bundleIdPrefix: com.henryz2004
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: $(BLINK_DEVELOPMENT_TEAM)
    PRODUCT_BUNDLE_IDENTIFIER: com.henryz2004.blink
    PRODUCT_NAME: Blink
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Blink/Info.plist
    CODE_SIGN_ENTITLEMENTS: Blink/Blink.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_CODE_SIGN_FLAGS: "--options=runtime"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  PermissionFlow:
    url: https://github.com/twodayslate/PermissionFlow.git
    revision: 362ff1f5d025bc57408717e1a755afd4dd47ff20

targets:
  Blink:
    type: application
    platform: macOS
    sources:
      - Blink
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/onboarding
        buildPhase: resources
    dependencies:
      - sdk: AppKit.framework
      - sdk: ApplicationServices.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: Carbon.framework
      - sdk: IOKit.framework
      - sdk: Quartz.framework
      - package: Sparkle
      - package: PermissionFlow
      - package: PermissionFlow
        product: PermissionFlowExtendedStatus
    info:
      path: Blink/Info.plist
      properties:
        CFBundleName: Blink
        CFBundleDisplayName: Blink
        CFBundleIdentifier: com.henryz2004.blink
        CFBundleShortVersionString: "0.2.24"
        # Build-time placeholder. Auto-stamped by app/scripts/build.sh from
        # `git rev-list --count HEAD` plus app/BUILD_NUMBER_OFFSET, unless
        # BLINK_BUILD_NUMBER is set; editing this value has no effect on
        # shipped builds.
        CFBundleVersion: "1"
        CFBundleExecutable: Blink
        LSMinimumSystemVersion: "14.0"
        # Build-time placeholder. release.sh asserts BLINK_SPARKLE_FEED_URL
        # matches the actual upload destination; this default is only used
        # for local dry runs that skip upload.
        SUFeedURL: "https://dl.useblink.dev/appcast.xml"
        SUPublicEDKey: "REPLACE_WITH_SPARKLE_PUBLIC_ED25519_KEY"
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUEnableInstallerLauncherService: true
        NSHumanReadableCopyright: "© 2026 Henry Zhang. All rights reserved."
        NSAppleEventsUsageDescription: "Blink uses accessibility events to paste selected suggestions."
        NSScreenCaptureUsageDescription: "Blink captures the active window to summarize it and suggest replies."
        NSInputMonitoringUsageDescription: "Blink listens for the summary hotkey and numbered overlay choices."

  BlinkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - BlinkTests
    dependencies:
      - target: Blink
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: BlinkTests
        PRODUCT_MODULE_NAME: BlinkTests
